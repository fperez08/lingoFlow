name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  statuses: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Emit pending status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f context="ci/pr-checks" \
            -f description="Lint and unit tests running…" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: pnpm test

      - name: Evaluate initial checks
        id: initial_checks
        run: |
          if [ "${{ steps.lint.outcome }}" = "success" ] && [ "${{ steps.unit_tests.outcome }}" = "success" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail workflow if checks failing
        if: steps.initial_checks.outputs.failed == 'true'
        run: |
          echo "Lint or unit tests failed."
          exit 1

      - name: Emit success status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="ci/pr-checks" \
            -f description="Lint and unit tests passed." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Emit failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=failure \
            -f context="ci/pr-checks" \
            -f description="Lint or unit tests failed." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
